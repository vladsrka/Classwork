<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="#">
        <select name="tepeof-person">
            <option>Физическое лицо</option>
            <option>Юридическое лицо</option>
        </select>
        <p>
            <input name="name" type="text" placeholder="Фамилия, Имя, Отчество*" required>
        </p>
        <p>
            <input name="tel" type="tel" placeholder="Контактный телефон*" required>
        </p>
        <p>
            <input name="email" type="email" placeholder="E-male" required>
        </p>
        <p>
            <select name="pay">
                <option>Выбор варианта оплаты</option>
                <option>Наличный</option>
                <option>Безналичный</option>
            </select>
        </p>
        <p>
            <select name="">
                <option >Выбрать вид отгрузки товара</option>
                <option>Почта</option>
                <option>Куръер</option>
            </select>
        </p>
        <p>
            <input name="file" type="file" placeholder="Прикрепить файл" required>
        </p>
        <p>
            <textarea name="adres" placeholder="Ваш адрес"></textarea>
        </p>
        <p>
            <textarea name="comment" placeholder="Комментарии к заказу"></textarea>
        </p>
        <button style="color: red;" type="submit">ОФРМИТЬ ЗАКАЗ</button>
    </form>
</body>

</html>
